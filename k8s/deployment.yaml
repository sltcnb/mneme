apiVersion: apps/v1
kind: Deployment
metadata:
  name: mneme
  labels: { app: mneme }
spec:
  replicas: 2
  selector:
    matchLabels: { app: mneme }
  template:
    metadata:
      labels: { app: mneme }
    spec:
      containers:
        - name: mneme
          image: ghcr.io/sltcnb/mneme:latest
          args: ["serve", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          env:
            - name: MNEME_DATA
              value: /data
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { memory: "4Gi", cpu: "1" }
            limits: { memory: "16Gi", cpu: "4" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mneme-data
---
apiVersion: v1
kind: Service
metadata:
  name: mneme
spec:
  selector: { app: mneme }
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mneme-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 100Gi
